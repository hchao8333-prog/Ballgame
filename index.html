<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>殘血反殺！全自動物理亂彈生死鬥</title>
    <style>
        body {
            background-color: #121214;
            color: #ffffff;
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow-x: hidden;
        }
        h1 {
            color: #00ffcc;
            text-shadow: 0 0 10px rgba(0, 255, 204, 0.5);
            margin-bottom: 10px;
        }
        .setup-panel {
            background: #1e1e24;
            padding: 15px 25px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            display: flex;
            gap: 20px;
            align-items: center;
            margin-bottom: 20px;
            border: 1px solid #333;
            transition: opacity 0.3s ease;
        }
        .player-select {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        .player-select.p1 label { color: #ff4a4a; font-weight: bold; }
        .player-select.p2 label { color: #4a90e2; font-weight: bold; }
        select {
            background: #2a2a32;
            color: white;
            border: 1px solid #555;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            outline: none;
        }
        select:focus { border-color: #00ffcc; }
        #startBtn {
            background: linear-gradient(135deg, #00ffcc, #00bfff);
            color: #121214;
            border: none;
            padding: 12px 30px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 0 15px rgba(0, 255, 204, 0.4);
            margin-top: 18px;
        }
        #startBtn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 25px rgba(0, 255, 204, 0.7);
        }
        #canvasContainer {
            position: relative;
            background: #000;
            border-radius: 10px;
            box-shadow: 0 0 30px rgba(0, 255, 204, 0.2);
            overflow: hidden;
        }
        canvas {
            display: block;
            background: #0d0d11;
        }
        .hud {
            display: flex;
            justify-content: space-between;
            width: 800px;
            margin-bottom: 10px;
            font-weight: bold;
            font-size: 18px;
            transition: opacity 0.3s ease;
        }
        .hp-bar-container {
            width: 45%;
            background: #333;
            height: 20px;
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid #555;
        }
        .hp-bar {
            height: 100%;
            width: 100%;
            transition: width 0.1s linear;
        }
        #p1HpBar { background: linear-gradient(90deg, #ff4a4a, #ff8585); box-shadow: 0 0 10px rgba(255,74,74,0.5); }
        #p2HpBar { background: linear-gradient(90deg, #4a90e2, #85b7ff); box-shadow: 0 0 10px rgba(74,144,226,0.5); }
        #announcement {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 24px;
            font-weight: bold;
            text-shadow: 0 0 10px black;
            pointer-events: none;
            text-align: center;
            width: 100%;
            z-index: 10;
        }
    </style>
</head>
<body>

    <h1>《殘血反殺！全自動物理亂彈生死鬥》</h1>

    <div id="setupPanel" class="setup-panel">
        <div class="player-select p1">
            <label>玩家 1 (紅方)</label>
            <select id="p1Select">
                <option value="ninja">🥷 忍者</option>
                <option value="giant">🧱 巨大</option>
                <option value="maiden">⛩️ 巫女</option>
                <option value="blocker">🚧 障礙物</option>
                <option value="crow">🪶 烏鴉</option>
                <option value="invincible">🛡️ 無敵</option>
            </select>
        </div>
        <button id="startBtn">START BATTLE</button>
        <div class="player-select p2">
            <label>玩家 2 (藍方)</label>
            <select id="p2Select">
                <option value="giant">🧱 巨大</option>
                <option value="ninja">🥷 忍者</option>
                <option value="maiden">⛩️ 巫女</option>
                <option value="blocker">🚧 障礙物</option>
                <option value="crow">🪶 烏鴉</option>
                <option value="invincible">🛡️ 無敵</option>
            </select>
        </div>
    </div>

    <div id="hudText" class="hud" style="opacity: 0; pointer-events: none;">
        <div style="color:#ff4a4a;">P1 HP: <span id="p1HpText">5000</span></div>
        <div style="color:#4a90e2;">P2 HP: <span id="p2HpText">5000</span></div>
    </div>
    
    <div id="hudBars" class="hud" style="margin-top:-10px; margin-bottom:15px; opacity: 0; pointer-events: none;">
        <div class="hp-bar-container"><div id="p1HpBar" class="hp-bar"></div></div>
        <div class="hp-bar-container"><div id="p2HpBar" class="hp-bar"></div></div>
    </div>

    <div id="canvasContainer">
        <div id="announcement"></div>
        <canvas id="gameCanvas" width="800" height="550"></canvas>
    </div>
    <script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const startBtn = document.getElementById('startBtn');
const p1Select = document.getElementById('p1Select');
const p2Select = document.getElementById('p2Select');
const announcement = document.getElementById('announcement');
const setupPanel = document.getElementById('setupPanel');
const hudText = document.getElementById('hudText');
const hudBars = document.getElementById('hudBars');

let gameActive = false, p1, p2, projectiles = [], obstacles = [], particles = [], zones = [], screenShake = 0, hitStopFrames = 0;
const BASE_HP = 5000, BASE_RADIUS = 25, BASE_SPEED = 6, BASE_DAMAGE = 25; 

class Ball {
    constructor(id, x, y, color, type) {
        this.id = id; this.x = x; this.y = y; this.baseRadius = BASE_RADIUS; this.radius = BASE_RADIUS;
        this.color = color; this.type = type; this.hp = BASE_HP; this.mass = 1; this.baseSpeed = BASE_SPEED;
        let angle = (id === 1) ? (Math.random() * 0.8 - 0.4) : (Math.random() * 0.8 + Math.PI - 0.4);
        this.vx = Math.cos(angle) * this.baseSpeed; this.vy = Math.sin(angle) * this.baseSpeed;
        this.isAwakened = false; this.skillTimer = 0; this.bounceCount = 0; this.isInvincible = false; this.invincibleTimer = 0; this.isClone = false;
    }
    update() {
        if (this.hp <= 1000 && !this.isAwakened) {
            this.isAwakened = true;
            triggerAnnouncement(`${this.id === 1 ? '紅方' : '藍方'} 殘血覺醒！`, this.color);
            if (this.type === 'blocker') explodeAllObstacles(this);
            if (this.type === 'ninja' && !this.isClone) spawnNinjaClone(this);
        }
        if (this.isInvincible) { this.invincibleTimer--; if (this.invincibleTimer <= 0) this.isInvincible = false; }
        this.skillTimer++; this.executeTalent(); this.x += this.vx; this.y += this.vy;
        if (this.x - this.radius < 0) { this.x = this.radius; this.vx *= -1; this.onWallBounce(); }
        else if (this.x + this.radius > canvas.width) { this.x = canvas.width - this.radius; this.vx *= -1; this.onWallBounce(); }
        if (this.y - this.radius < 0) { this.y = this.radius; this.vy *= -1; this.onWallBounce(); }
        else if (this.y + this.radius > canvas.height) { this.y = canvas.height - this.radius; this.vy *= -1; this.onWallBounce(); }
    }
    onWallBounce() {
        this.bounceCount++;
        if (this.type === 'giant') {
            let maxGrow = this.isAwakened ? 2.5 : 1.6;
            if (this.radius < this.baseRadius * maxGrow) {
                this.radius += 0.5; this.mass += 0.05;
                let curSpd = Math.hypot(this.vx, this.vy), newSpd = Math.min(curSpd + 0.15, 14);
                this.vx = (this.vx / curSpd) * newSpd; this.vy = (this.vy / curSpd) * newSpd;
            }
            if (this.isAwakened) screenShake = 8; 
        }
    }
    executeTalent() {
        if (this.type === 'crow' && this.skillTimer % 100 === 0) {
            let target = getEnemy(this);
            if (target) {
                if (!this.isAwakened) {
                    projectiles.push({ type: 'crow', x: this.x, y: this.y, vx: 0, vy: 0, radius: 8, color: '#9b59b6', owner: this, damage: 150, isTracking: true });
                } else {
                    let angle = Math.atan2(this.vy, this.vx);
                    projectiles.push({ type: 'giant_crow', x: this.x, y: this.y, vx: Math.cos(angle) * 10, vy: Math.sin(angle) * 10, radius: 30, color: '#4a148c', owner: this, damage: 450, isTracking: false });
                }
            }
        }
        if (this.type === 'ninja' && this.skillTimer % 120 === 0) {
            let target = getEnemy(this);
            if (target) {
                let angle = Math.atan2(target.y - this.y, target.x - this.x);
                for(let i=0; i<3; i++) {
                    let dev = (i - 1) * 0.2; 
                    projectiles.push({ type: 'kunai', x: this.x, y: this.y, vx: Math.cos(angle + dev) * 9, vy: Math.sin(angle + dev) * 9, radius: 5, color: '#e74c3c', owner: this, damage: 100 });
                }
            }
        }
        if (this.type === 'blocker' && this.skillTimer % 150 === 0 && !this.isAwakened) {
            obstacles.push({ x: this.x - this.vx * 3, y: this.y - this.vy * 3, size: 30, owner: this });
            if (obstacles.length > 5) obstacles.shift(); 
        }
        if (this.type === 'invincible' && this.skillTimer % 240 === 0) { this.isInvincible = true; this.invincibleTimer = 120; }
        if (this.type === 'maiden' && this.skillTimer % 200 === 0) {
            zones.push({ type: this.isAwakened ? 'lunar' : 'shrine', x: Math.random() * (canvas.width - 200) + 100, y: Math.random() * (canvas.height - 200) + 100, radius: this.isAwakened ? 120 : 70, owner: this, duration: 240 });
            if (zones.length > 2) zones.shift();
        }
    }
    takeDamage(amount, attacker) {
        if (this.isInvincible) {
            if (this.isAwakened && attacker && attacker !== this) { attacker.takeDamage(amount, this); createParticles(this.x, this.y, '#f1c40f', 10); }
            return;
        }
        this.hp = Math.max(0, this.hp - amount); createParticles(this.x, this.y, this.color, 8); hitStopFrames = 2; 
    }
    draw() {
        ctx.save(); if (this.isAwakened) { ctx.shadowBlur = 20; ctx.shadowColor = this.color; }
        ctx.beginPath(); ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2); ctx.fillStyle = this.color; ctx.fill(); ctx.closePath();
        if (this.isInvincible) {
            ctx.beginPath(); ctx.arc(this.x, this.y, this.radius + 10, 0, Math.PI * 2); ctx.strokeStyle = this.isAwakened ? '#e67e22' : '#f1c40f'; ctx.lineWidth = this.isAwakened ? 5 : 3; ctx.stroke(); ctx.closePath();
        }
        ctx.restore();
    }
}

function getEnemy(self) { return self.id === 1 ? p2 : p1; }
function triggerAnnouncement(text, color) { announcement.innerText = text; announcement.style.color = color; setTimeout(() => { if (announcement.innerText === text) announcement.innerText = ''; }, 2000); }
function createParticles(x, y, color, count) { for (let i = 0; i < count; i++) { particles.push({ x: x, y: y, vx: (Math.random() - 0.5) * 6, vy: (Math.random() - 0.5) * 6, radius: Math.random() * 3 + 1, color: color, alpha: 1 }); } }

function explodeAllObstacles(owner) {
    let enemy = getEnemy(owner);
    obstacles.forEach(obs => {
        createParticles(obs.x + obs.size/2, obs.y + obs.size/2, '#e67e22', 15);
        let dist = Math.hypot(enemy.x - (obs.x + obs.size/2), enemy.y - (obs.y + obs.size/2));
        if (dist < 150) { enemy.takeDamage(400, owner); enemy.vx += Math.cos(Math.atan2(enemy.y - (obs.y + obs.size/2), enemy.x - (obs.x + obs.size/2))) * 12; enemy.vy += Math.sin(Math.atan2(enemy.y - (obs.y + obs.size/2), enemy.x - (obs.x + obs.size/2))) * 12; }
    });
    obstacles = []; screenShake = 12;
}

function spawnNinjaClone(parent) {
    let clone = new Ball(parent.id, parent.x, parent.y, '#555555', 'ninja'); clone.isClone = true; clone.hp = parent.hp; clone.vx = -parent.vx * 1.2; clone.vy = -parent.vy * 1.2; window.ninjaClone = clone;
    setTimeout(() => { window.ninjaClone = null; }, 10000);
}

function handleBallCollision(b1, b2) {
    let dx = b2.x - b1.x, dy = b2.y - b1.y, distance = Math.hypot(dx, dy);
    if (distance < b1.radius + b2.radius) {
        let overlap = (b1.radius + b2.radius) - distance, nx = dx / distance, ny = dy / distance;
        b1.x -= nx * overlap * 0.5; b1.y -= ny * overlap * 0.5; b2.x += nx * overlap * 0.5; b2.y += ny * overlap * 0.5;
        let kx = b1.vx - b2.vx, ky = b1.vy - b2.vy, p = 2 * (nx * kx + ny * ky) / (b1.mass + b2.mass);
        b1.vx -= p * b2.mass * nx; b1.vy -= p * b2.mass * ny; b2.vx += p * b1.mass * nx; b2.vy += p * b1.mass * ny;
        let relSpd = Math.hypot(kx, ky); b1.takeDamage(Math.round(BASE_DAMAGE * b2.mass * (relSpd / BASE_SPEED)), b2); b2.takeDamage(Math.round(BASE_DAMAGE * b1.mass * (relSpd / BASE_SPEED)), b1); screenShake = Math.min(relSpd, 10);
    }
}

function handleObstacleCollision(ball) {
    obstacles.forEach(obs => {
        let closestX = Math.max(obs.x, Math.min(ball.x, obs.x + obs.size)), closestY = Math.max(obs.y, Math.min(ball.y, obs.y + obs.size));
        let distanceX = ball.x - closestX, distanceY = ball.y - closestY, distance = Math.hypot(distanceX, distanceY);
        if (distance < ball.radius) {
            if (Math.abs(distanceX) > Math.abs(distanceY)) { ball.vx *= -1; ball.x = distanceX > 0 ? closestX + ball.radius : closestX - ball.radius; }
            else { ball.vy *= -1; ball.y = distanceY > 0 ? closestY + ball.radius : closestY - ball.radius; }
            ball.onWallBounce();
        }
    });
}

function handleGameOver() {
    gameActive = false; ctx.restore(); ctx.fillStyle = 'rgba(0, 0, 0, 0.75)'; ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.font = 'bold 40px sans-serif'; ctx.textAlign = 'center';
    if (p1.hp <= 0 && p2.hp <= 0) { ctx.fillStyle = '#ffffff'; ctx.fillText('平手！', canvas.width / 2, canvas.height / 2 - 20); }
    else if (p1.hp <= 0) { ctx.fillStyle = '#4a90e2'; ctx.fillText('藍方 (PLAYER 2) 獲勝！', canvas.width / 2, canvas.height / 2 - 20); }
    else { ctx.fillStyle = '#ff4a4a'; ctx.fillText('紅方 (PLAYER 1) 獲勝！', canvas.width / 2, canvas.height / 2 - 20); }
    ctx.font = '20px sans-serif'; ctx.fillStyle = '#aaaaaa'; ctx.fillText('正在回到主選單...', canvas.width / 2, canvas.height / 2 + 40);
    setTimeout(() => { ctx.clearRect(0, 0, canvas.width, canvas.height); hudText.style.opacity = '0'; hudBars.style.opacity = '0'; setupPanel.style.opacity = '1'; setupPanel.style.pointerEvents = 'auto'; }, 3000);
}

function gameLoop() {
    if (!gameActive) return; if (hitStopFrames > 0) { hitStopFrames--; requestAnimationFrame(gameLoop); return; }
    ctx.clearRect(0, 0, canvas.width, canvas.height); ctx.save();
if (screenShake > 0) { ctx.translate((Math.random() - 0.5) * screenShake, (Math.random() - 0.5) * screenShake); screenShake *= 0.9; if (screenShake < 0.5) screenShake = 0; }zones.forEach((zone, index) => {zone.duration--; if (zone.duration <= 0) { zones.splice(index, 1); return; }ctx.beginPath(); ctx.arc(zone.x, zone.y, zone.radius, 0, Math.PI * 2); ctx.fillStyle = zone.type === 'lunar' ? 'rgba(155, 89, 182, 0.15)' : 'rgba(46, 204, 113, 0.15)'; ctx.fill(); ctx.strokeStyle = zone.type === 'lunar' ? '#9b59b6' : '#2ecc71'; ctx.lineWidth = 2; ctx.stroke(); ctx.closePath();[p1, p2, window.ninjaClone].forEach(b => {if (!b) return;if (b.type === 'maiden' && b === zone.owner) {if (Math.hypot(b.x - zone.x, b.y - zone.y) < zone.radius + b.radius) b.hp = Math.min(BASE_HP, b.hp + (zone.type === 'lunar' ? 8 : 4));if (zone.type === 'lunar') { ctx.beginPath(); ctx.moveTo(zone.x, zone.y); ctx.lineTo(b.x, b.y); ctx.strokeStyle = 'rgba(255, 255, 255, 0.6)'; ctx.lineWidth = 3; ctx.stroke(); ctx.closePath(); }}if (zone.type === 'lunar' && b !== zone.owner && Math.hypot(b.x - zone.x, b.y - zone.y) < zone.radius) b.takeDamage(2, zone.owner);});});obstacles.forEach(obs => { ctx.fillStyle = '#7f8c8d'; ctx.fillRect(obs.x, obs.y, obs.size, obs.size); ctx.strokeStyle = '#bdc3c7'; ctx.strokeRect(obs.x, obs.y, obs.size, obs.size); });p1.update(); p2.update();if (window.ninjaClone) { window.ninjaClone.update(); window.ninjaClone.draw(); handleBallCollision(window.ninjaClone, p2); handleObstacleCollision(window.ninjaClone); }handleBallCollision(p1, p2); handleObstacleCollision(p1); handleObstacleCollision(p2);p1.draw(); p2.draw();projectiles.forEach((proj, index) => {let enemy = getEnemy(proj.owner); if (proj.isTracking) { let angle = Math.atan2(enemy.y - proj.y, enemy.x - proj.x); proj.vx = Math.cos(angle) * 4.5; proj.vy = Math.sin(angle) * 4.5; }proj.x += proj.vx; proj.y += proj.vy;ctx.beginPath(); ctx.arc(proj.x, proj.y, proj.radius, 0, Math.PI * 2); ctx.fillStyle = proj.color; ctx.fill(); ctx.closePath();if (proj.type === 'kunai') {if (proj.x - proj.radius < 0 || proj.x + proj.radius > canvas.width) proj.vx *= -1; if (proj.y - proj.radius < 0 || proj.y + proj.radius > canvas.height) proj.vy *= -1;obstacles.forEach(obs => { if (proj.x > obs.x && proj.x < obs.x + obs.size && proj.y > obs.y && proj.y < obs.y + obs.size) proj.vy *= -1; });}if (proj.type === 'giant_crow') { obstacles.forEach((obs, oIdx) => { if (Math.hypot(proj.x - (obs.x + obs.size/2), proj.y - (obs.y + obs.size/2)) < proj.radius + obs.size/2) { createParticles(obs.x + obs.size/2, obs.y + obs.size/2, '#7f8c8d', 8); obstacles.splice(oIdx, 1); } }); }let targets = proj.owner.isClone ? [p1, p2].filter(b => b.id !== proj.owner.id) : [enemy];targets.forEach(t => { if (Math.hypot(proj.x - t.x, proj.y - t.y) < proj.radius + t.radius) { t.takeDamage(proj.damage, proj.owner); projectiles.splice(index, 1); } });if (proj.type !== 'kunai' && (proj.x < -50 || proj.x > canvas.width + 50 || proj.y < -50 || proj.y > canvas.height + 50)) projectiles.splice(index, 1);});particles.forEach((part, index) => { part.x += part.vx; part.y += part.vy; part.alpha -= 0.02; if (part.alpha <= 0) { particles.splice(index, 1); return; } ctx.save(); ctx.globalAlpha = part.alpha; ctx.beginPath(); ctx.arc(part.x, part.y, part.radius, 0, Math.PI * 2); ctx.fillStyle = part.color; ctx.fill(); ctx.restore(); });document.getElementById('p1HpText').innerText = p1.hp; document.getElementById('p2HpText').innerText = p2.hp; document.getElementById('p1HpBar').style.width = (p1.hp / BASE_HP * 100) + '%'; document.getElementById('p2HpBar').style.width = (p2.hp / BASE_HP * 100) + '%';if (p1.hp <= 0 || p2.hp <= 0) { handleGameOver(); return; }ctx.restore(); requestAnimationFrame(gameLoop);}startBtn.addEventListener('click', () => {projectiles = []; obstacles = []; particles = []; zones = []; window.ninjaClone = null; announcement.innerText = '';setupPanel.style.opacity = '0'; setupPanel.style.pointerEvents = 'none'; hudText.style.opacity = '1'; hudBars.style.opacity = '1';p1 = new Ball(1, 150, canvas.height / 2, '#ff4a4a', p1Select.value); p2 = new Ball(2, canvas.width - 150, canvas.height / 2, '#4a90e2', p2Select.value);gameActive = true; gameLoop();});
