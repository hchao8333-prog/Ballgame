<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>粉紅法陣優化版-物理碰撞大亂鬥</title>
    <style>
        body { margin: 0; background: #111; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; color: #fff; font-family: sans-serif; }
        #control { margin-bottom: 10px; }
        select, button { padding: 6px 12px; background: #333; color: #fff; border: 1px solid #555; cursor: pointer; }
        canvas { border: 2px solid #555; background: #050505; }
        #status { font-size: 18px; margin-bottom: 10px; color: #ffeb3b; font-weight: bold; }
    </style>
</head>
<body>

    <div id="status">選擇角色並點擊開始！</div>
    <div id="control">
        紅方: 
        <select id="p1Select">
            <option value="crow">烏鴉</option>
            <option value="shield">護盾</option>
            <option value="giant">巨大</option>
            <option value="shaman">巫女</option>
        </select>
        藍方: 
        <select id="p2Select">
            <option value="crow">烏鴉</option>
            <option value="shield" selected>護盾</option>
            <option value="giant">巨大</option>
            <option value="shaman">巫女</option>
        </select>
        <button id="startBtn">開始戰鬥</button>
    </div>
    <canvas id="gameCanvas" width="700" height="450"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

let gameRunning = false;
let p1 = null, p2 = null;
let projectiles = []; 
let zones = [];       

const BASE_SPEED = 6;

class Ball {
    constructor(x, y, color, side, type) {
        this.x = x; this.y = y; this.color = color; this.side = side; this.type = type;
        this.baseRadius = 20; this.radius = this.baseRadius;
        this.hp = 100; this.maxHp = 100;
        
        let angle = Math.random() * Math.PI * 2;
        this.vx = Math.cos(angle) * BASE_SPEED;
        this.vy = Math.sin(angle) * BASE_SPEED;

        this.timer = 0;
        this.isShielded = false;
        this.isGiant = false;
        this.halfHpTriggered = false;
        this.isInZone = false; 
    }

    get mass() { return this.radius; }

    update(enemy) {
        if (this.hp <= 0) return;

        if (this.hp <= 50 && !this.halfHpTriggered) {
            this.halfHpTriggered = true;
            if (this.type === 'shaman') { 
                enemy.hp = Math.max(0, enemy.hp - 35);
                this.hp = Math.min(this.maxHp, this.hp + 15);
            }
        }

        let currentSpeed = BASE_SPEED;
        if (this.isGiant) currentSpeed *= (this.halfHpTriggered ? 2.0 : 1.3);
        if (this.type === 'shaman' && this.isInZone) currentSpeed *= 1.5;

        let d = Math.hypot(this.vx, this.vy);
        if (d > 0) {
            this.vx = (this.vx / d) * currentSpeed;
            this.vy = (this.vy / d) * currentSpeed;
        }

        this.x += this.vx; this.y += this.vy;

        if (this.x - this.radius < 0) { this.x = this.radius; this.vx = -this.vx; }
        if (this.x + this.radius > canvas.width) { this.x = canvas.width - this.radius; this.vx = -this.vx; }
        if (this.y - this.radius < 0) { this.y = this.radius; this.vy = -this.vy; }
        if (this.y + this.radius > canvas.height) { this.y = canvas.height - this.radius; this.vy = -this.vy; }

        this.timer++;
        
        if (this.type === 'crow' && this.timer >= 600) {
            this.timer = 0;
            projectiles.push({
                x: this.x, y: this.y,
                target: enemy,
                side: this.side,
                radius: this.halfHpTriggered ? 12 : 7, 
                speed: this.halfHpTriggered ? 5.5 : 4,
                isSpecial: this.halfHpTriggered
            });
        }
        else if (this.type === 'shield') {
            let cycle = this.timer % 600;
            this.isShielded = (cycle < 300); 
        }
        else if (this.type === 'giant') {
            let cycle = this.timer % 600;
            if (cycle < 300) {
                this.isGiant = true;
                this.radius = this.baseRadius * (this.halfHpTriggered ? 2.0 : 1.5);
            } else {
                this.isGiant = false;
                this.radius = this.baseRadius;
            }
        }
        else if (this.type === 'shaman' && this.timer >= 300) {
            this.timer = 0;
            zones.push({
                x: this.x, y: this.y,
                radius: 85, 
                life: 240,  
                side: this.side
            });
        }

        if (this.type === 'shaman') {
            this.isInZone = zones.some(z => z.side === this.side && Math.hypot(this.x - z.x, this.y - z.y) < z.radius);
            if (this.isInZone) {
                this.hp = Math.min(this.maxHp, this.hp + 0.1); 
            }
        }
    }

    draw() {
        if (this.hp <= 0) return;

        ctx.beginPath();
        ctx.arc(this.x, this.y, this.radius, 0, Math.PI*2);
        // 站在法陣內時，球體會發出粉紅光芒 (#ff69b4)
        ctx.fillStyle = this.isInZone ? '#ff69b4' : this.color;
        ctx.fill();

        if (this.isShielded) {
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.radius + 8, 0, Math.PI*2);
            ctx.strokeStyle = '#00e5ff';
            ctx.lineWidth = 3;
            ctx.stroke();
        }

        ctx.fillStyle = '#fff'; ctx.font = '12px Arial'; ctx.textAlign = 'center';
        ctx.fillText(this.type.toUpperCase() + (this.halfHpTriggered?"★":"") + ` (${Math.floor(this.hp)})`, this.x, this.y - this.radius - 5);
    }
}

function checkCollision() {
    let dx = p2.x - p1.x, dy = p2.y - p1.y;
    let dist = Math.hypot(dx, dy);
    let minDist = p1.radius + p2.radius;

    if (dist < minDist && p1.hp > 0 && p2.hp > 0) {
        if (!p1.isShielded) p1.hp = Math.max(0, p1.hp - 8);
        if (!p2.isShielded) p2.hp = Math.max(0, p2.hp - 8);

        let overlap = minDist - dist;
        let nx = dx / dist, ny = dy / dist;
        p1.x -= nx * overlap * 0.5; p1.y -= ny * overlap * 0.5;
        p2.x += nx * overlap * 0.5; p2.y += ny * overlap * 0.5;

        let kx = p1.vx - p2.vx, ky = p1.vy - p2.vy;
        let p = 2 * (nx * kx + ny * ky) / (p1.mass + p2.mass);
        p1.vx -= p * p2.mass * nx; p1.vy -= p * p2.mass * ny;
        p2.vx += p * p1.mass * nx; p2.vy += p * p1.mass * ny;
    }
}

function updateGame() {
    p1.update(p2);
    p2.update(p1);
    checkCollision();

    zones.forEach(z => z.life--);
    zones = zones.filter(z => z.life > 0);

    projectiles.forEach((crow, idx) => {
        let tdx = crow.target.x - crow.x;
        let tdy = crow.target.y - crow.y;
        let tdist = Math.hypot(tdx, tdy);

        if (tdist > 0) {
            crow.x += (tdx / tdist) * crow.speed;
            crow.y += (tdy / tdist) * crow.speed;
        }

        if (tdist < crow.target.radius + crow.radius) {
            crow.target.takeDamage(12);
            projectiles.splice(idx, 1); 
        }
    });
}

function drawEverything() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // 1. 繪製明顯的粉紅色巫女回血陣
    zones.forEach(z => {
        ctx.beginPath();
        ctx.arc(z.x, z.y, z.radius, 0, Math.PI*2);
        // 設定粉紅色的邊框與半透明內圈
        ctx.strokeStyle = 'rgba(255, 105, 180, 0.7)'; 
        ctx.lineWidth = 3;
        ctx.stroke();
        ctx.fillStyle = 'rgba(255, 105, 180, 0.15)'; 
        ctx.fill();
    });

    // 2. 繪製追蹤烏鴉
    projectiles.forEach(crow => {
        ctx.beginPath();
        ctx.arc(crow.x, crow.y, crow.radius, 0, Math.PI*2);
        ctx.fillStyle = crow.isSpecial ? '#e67e22' : '#9b59b6'; 
        ctx.fill();
        ctx.strokeStyle = '#fff';
        ctx.lineWidth = 1;
        ctx.stroke();
    });

    p1.draw();
    p2.draw();
}

function gameLoop() {
    if (!gameRunning) return;

    updateGame();
    drawEverything();

    const statusText = document.getElementById('status');
    if (p1.hp <= 0 && p2.hp <= 0) { statusText.innerText = "💥 平手！"; gameRunning = false; }
    else if (p1.hp <= 0) { statusText.innerText = "🔵 藍方獲勝！"; gameRunning = false; }
    else if (p2.hp <= 0) { statusText.innerText = "🔴 紅方獲勝！"; gameRunning = false; }

    if (gameRunning) requestAnimationFrame(gameLoop);
}

document.getElementById('startBtn').addEventListener('click', () => {
    projectiles = [];
    zones = [];
    p1 = new Ball(150, 225, '#ff1744', 'p1', document.getElementById('p1Select').value);
    p2 = new Ball(550, 225, '#2979ff', 'p2', document.getElementById('p2Select').value);
    document.getElementById('status').innerText = "⚔️ 戰鬥中...";
    gameRunning = true;
    gameLoop();
});
</script>
</body>
</html>
