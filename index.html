<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>殘血反殺！全自動物理亂彈生死鬥</title>
    <style>
        body { 
            background-color: #121214; 
            color: #ffffff; 
            font-family: sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            margin: 0; 
        }
        h1 { 
            color: #00ffcc; 
            text-shadow: 0 0 10px rgba(0, 255, 204, 0.5); 
        }
        .panel { 
            background: #1e1e24; 
            padding: 15px 25px; 
            border-radius: 12px; 
            display: flex; 
            gap: 20px; 
            align-items: center; 
            margin-bottom: 20px; 
            border: 1px solid #333; 
        }
        select, button { 
            background: #2a2a32; 
            color: white; 
            border: 1px solid #555; 
            padding: 8px 12px; 
            border-radius: 6px; 
            font-size: 16px; 
            cursor: pointer; 
        }
        #startBtn { 
            background: linear-gradient(135deg, #00ffcc, #00bfff); 
            color: #121214; 
            font-weight: bold; 
            border: none; 
            padding: 10px 25px; 
        }
        .hud { 
            display: flex; 
            justify-content: space-between; 
            width: 800px; 
            margin-bottom: 5px; 
            font-weight: bold; 
        }
        .hp-box { 
            width: 45%; 
            background: #333; 
            height: 16px; 
            border-radius: 8px; 
            overflow: hidden; 
            border: 1px solid #555; 
        }
        .hp-bar { 
            height: 100%; 
            width: 100%; 
        }
        #p1Bar { background: #ff4a4a; } 
        #p2Bar { background: #4a90e2; }
        #container { 
            position: relative; 
            background: #18181c; 
            border-radius: 10px; 
            border: 2px solid #333; 
        }
        #msg { 
            position: absolute; 
            top: 20px; 
            left: 50%; 
            transform: translateX(-50%); 
            font-size: 24px; 
            font-weight: bold; 
            text-shadow: 0 0 8px black; 
            pointer-events: none; 
            z-index: 10; 
        }
    </style>
</head>
<body>

    <h1>《殘血反殺！全自動物理亂彈生死鬥》</h1>

    <div id="panel" class="panel">
        <div style="color:#ff4a4a; font-weight:bold;">P1 紅方: 
            <select id="p1Select">
                <option value="ninja">🥷 忍者</option>
                <option value="giant">🧱 巨大</option>
                <option value="maiden">⛩️ 巫女</option>
                <option value="blocker">🚧 障礙物</option>
                <option value="crow">🪶 烏鴉</option>
                <option value="invincible">🛡️ 無敵</option>
            </select>
        </div>
        <button id="startBtn">START BATTLE</button>
        <div style="color:#4a90e2; font-weight:bold;">P2 藍方: 
            <select id="p2Select">
                <option value="giant">🧱 巨大</option>
                <option value="ninja">🥷 忍者</option>
                <option value="maiden">⛩️ 巫女</option>
                <option value="blocker">🚧 障礙物</option>
                <option value="crow">🪶 烏鴉</option>
                <option value="invincible">🛡️ 無敵</option>
            </select>
        </div>
    </div>

    <!-- 將隱藏邏輯移除，改為預設直接顯示，避免網頁核心阻擋渲染 -->
    <div id="hud" class="hud">
        <div style="color:#ff4a4a;">P1 HP: <span id="p1Txt">5000</span></div>
        <div style="color:#4a90e2;">P2 HP: <span id="p2Txt">5000</span></div>
    </div>
    <div id="bars" class="hud" style="margin-top:-5px; margin-bottom:15px;">
        <div class="hp-box"><div id="p1Bar" class="hp-bar"></div></div>
        <div class="hp-box"><div id="p2Bar" class="hp-bar"></div></div>
    </div>

    <div id="container">
        <div id="msg"></div>
        <canvas id="ctx" width="800" height="500"></canvas>
    </div>

<script>
const canvas = document.getElementById('ctx');
const ctx = canvas.getContext('2d');
const startBtn = document.getElementById('startBtn');
const p1Select = document.getElementById('p1Select');
const p2Select = document.getElementById('p2Select');
const msg = document.getElementById('msg');
const panel = document.getElementById('panel');

// 初始先繪製一次畫布背景，防止網頁剛載入時黑屏
ctx.fillStyle = '#18181c';
ctx.fillRect(0, 0, canvas.width, canvas.height);

let gameActive = false;
let p1 = null;
let p2 = null;
let projectiles = [];
let obstacles = [];
let zones = [];
let shake = 0;
let ninjaClone = null;

class Ball {
    constructor(id, x, y, color, type) {
        this.id = id;
        this.x = x;
        this.y = y;
        this.radius = 25;
        this.color = color;
        this.type = type;
        this.hp = 5000;
        this.mass = 1;
        this.timer = 0;
        this.isAwake = false;
        this.isInv = false;
        this.invTime = 0;
        this.isClone = false;
        
        let angle = (id === 1) ? (Math.random() * 0.6 - 0.3) : (Math.random() * 0.6 + Math.PI - 0.3);
        this.vx = Math.cos(angle) * 6;
        this.vy = Math.sin(angle) * 6;
    }

    update() {
        if (this.hp <= 1000 && !this.isAwake) {
            this.isAwake = true;
            showMsg(`${this.id === 1 ? '紅方' : '藍方'} 殘血覺醒！`, this.color);
            
            if (this.type === 'blocker') {
                let enemy = (this.id === 1) ? p2 : p1;
                obstacles.forEach(o => {
                    let dist = Math.hypot(enemy.x - (o.x + 15), enemy.y - (o.y + 15));
                    if (dist < 150) {
                        enemy.hp = Math.max(0, enemy.hp - 400);
                        let a = Math.atan2(enemy.y - (o.y + 15), enemy.x - (o.x + 15));
                        enemy.vx += Math.cos(a) * 10;
                        enemy.vy += Math.sin(a) * 10;
                    }
                });
                obstacles = [];
                shake = 10;
            }
            
            if (this.type === 'ninja' && !this.isClone) {
                ninjaClone = new Ball(this.id, this.x, this.y, '#555555', 'ninja');
                ninjaClone.isClone = true;
                ninjaClone.hp = this.hp;
                ninjaClone.vx = -this.vx;
                ninjaClone.vy = -this.vy;
                setTimeout(() => { ninjaClone = null; }, 10000);
            }
        }

        if (this.isInv) {
            this.invTime--;
            if (this.invTime <= 0) this.isInv = false;
        }

        this.timer++;
        
        // 天賦機制
        if (this.type === 'crow' && this.timer % 100 === 0) {
            let enemy = (this.id === 1) ? p2 : p1;
            if (!this.isAwake) {
                projectiles.push({ type: 'crow', x: this.x, y: this.y, vx: 0, vy: 0, r: 8, color: '#9b59b6', owner: this, dmg: 150, track: true });
            } else {
                let a = Math.atan2(this.vy, this.vx);
                projectiles.push({ type: 'gcrow', x: this.x, y: this.y, vx: Math.cos(a) * 9, vy: Math.sin(a) * 9, r: 25, color: '#4a148c', owner: this, dmg: 450, track: false });
            }
        }

        if (this.type === 'ninja' && this.timer % 120 === 0) {
            let enemy = (this.id === 1) ? p2 : p1;
            let a = Math.atan2(enemy.y - this.y, enemy.x - this.x);
            for(let i = 0; i < 3; i++) {
                projectiles.push({ type: 'kunai', x: this.x, y: this.y, vx: Math.cos(a + (i - 1) * 0.25) * 8, vy: Math.sin(a + (i - 1) * 0.25) * 8, r: 5, color: '#e74c3c', owner: this, dmg: 100 });
            }
        }

        if (this.type === 'blocker' && this.timer % 140 === 0 && !this.isAwake) {
            obstacles.push({ x: this.x - this.vx * 3, y: this.y - this.vy * 3, size: 30 });
            if (obstacles.length > 5) obstacles.shift();
        }

        if (this.type === 'invincible' && this.timer % 220 === 0) {
            this.isInv = true;
            this.invTime = 120;
        }

        if (this.type === 'maiden' && this.timer % 180 === 0) {
            zones.push({ type: this.isAwake ? 'lunar' : 'shrine', x: Math.random() * 500 + 150, y: Math.random() * 300 + 100, r: this.isAwake ? 110 : 70, owner: this, duration: 240 });
        }

        this.x += this.vx;
        this.y += this.vy;
        
        // 邊界碰撞邊界修正
        if (this.x - this.radius < 0) { this.x = this.radius; this.vx *= -1; this.bounce(); }
        else if (this.x + this.radius > canvas.width) { this.x = canvas.width - this.radius; this.vx *= -1; this.bounce(); }
        
        if (this.y - this.radius < 0) { this.y = this.radius; this.vy *= -1; this.bounce(); }
        else if (this.y + this.radius > canvas.height) { this.y = canvas.height - this.radius; this.vy *= -1; this.bounce(); }
    }

    bounce() {
        if (this.type === 'giant') {
            let max = this.isAwake ? 2.5 : 1.6;
            if (this.radius < 25 * max) {
                this.radius += 0.6;
                this.mass += 0.05;
                this.vx *= 1.02;
                this.vy *= 1.02;
            }
            if (this.isAwake) shake = 6;
        }
    }

    damage(amt, atk) {
        if (this.isInv) {
            if (this.isAwake && atk && atk !== this) {
                atk.damage(amt, this);
            }
            return;
        }
        this.hp = Math.max(0, this.hp - amt);
    }

    draw() {
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
        ctx.fillStyle = this.color;
        ctx.fill();
        ctx.closePath();
        
        if (this.isInv) {
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.radius + 8, 0, Math.PI * 2);
            ctx.strokeStyle = '#f1c40f';
            ctx.lineWidth = 3;
            ctx.stroke();
            ctx.closePath();
        }
    }
}

function showMsg(txt, clr) {
    msg.innerText = txt;
    msg.style.color = clr;
    setTimeout(() => { if(msg.innerText === txt) msg.innerText = ''; }, 2000);}function collideBalls(b1, b2) {let d = Math.hypot(b2.x - b1.x, b2.y - b1.y);if (d < b1.radius + b2.radius) {let ov = (b1.radius + b2.radius) - d;let nx = (b2.x - b1.x) / d;let ny = (b2.y - b1.y) / d;b1.x -= nx * ov * 0.5; b1.y -= ny * ov * 0.5;b2.x += nx * ov * 0.5; b2.y += ny * ov * 0.5;let kx = b1.vx - b2.vx;let ky = b1.vy - b2.vy;let p = 2 * (nx * kx + ny * ky) / (b1.mass + b2.mass);b1.vx -= p * b2.mass * nx; b1.vy -= p * b2.mass * ny;b2.vx += p * b1.mass * nx; b2.vy += p * b1.mass * ny;let spd = Math.hypot(kx, ky);let d1 = Math.round(25 * b2.mass * (spd / 6));let d2 = Math.round(25 * b1.mass * (spd / 6));b1.damage(d1, b2);b2.damage(d2, b1);shake = Math.min(spd, 8);}}function collideObs(b) {obstacles.forEach(o => {let cx = Math.max(o.x, Math.min(b.x, o.x + o.size));let cy = Math.max(o.y, Math.min(b.y, o.y + o.size));let dx = b.x - cx;let dy = b.y - cy;let dist = Math.hypot(dx, dy);if (dist < b.radius) {if (Math.abs(dx) > Math.abs(dy)) {b.vx *= -1;b.x = dx > 0 ? cx + b.radius : cx - b.radius;} else {b.vy *= -1;b.y = dy > 0 ? cy + b.radius : cy - b.radius;}b.bounce();}});}function loop() {if (!gameActive) return;// 每幀強制重繪背景色ctx.fillStyle = '#18181c';ctx.fillRect(0, 0, canvas.width, canvas.height);ctx.save();if (shake > 0) {ctx.translate((Math.random() - 0.5) * shake, (Math.random() - 0.5) * shake);shake *= 0.9;if (shake < 0.2) shake = 0;}// 繪製結界zones.forEach((z, idx) => {z.duration--;if (z.duration <= 0) { zones.splice(idx, 1); return; }ctx.beginPath();ctx.arc(z.x, z.y, z.r, 0, Math.PI * 2);ctx.fillStyle = (z.type === 'lunar') ? 'rgba(155,89,182,0.15)' : 'rgba(46,204,113,0.15)';ctx.fill();ctx.closePath();[p1, p2, ninjaClone].forEach(b => {if (!b) return;if (b.type === 'maiden' && b === z.owner) {if (Math.hypot(b.x - z.x, b.y - z.y) < z.r) {b.hp = Math.min(5000, b.hp + (z.type === 'lunar' ? 7 : 4));}if (z.type === 'lunar') {ctx.beginPath(); ctx.moveTo(z.x, z.y); ctx.lineTo(b.x, b.y);ctx.strokeStyle = '#ffffff'; ctx.stroke();}}if (z.type === 'lunar' && b !== z.owner && Math.hypot(b.x - z.x, b.y - z.y) < z.r) {b.damage(2, z.owner);}});});// 繪製障礙物obstacles.forEach(o => {ctx.fillStyle = '#7f8c8d';ctx.fillRect(o.x, o.y, o.size, o.size);});// 更新與繪製主球p1.update();p2.update();if (ninjaClone) {ninjaClone.update();ninjaClone.draw();collideBalls(ninjaClone, p2);collideObs(ninjaClone);}collideBalls(p1, p2);collideObs(p1);collideObs(p2);p1.draw();p2.draw();// 更新投影物技能projectiles.forEach((p, idx) => {let enemy = (p.owner.id === 1) ? p2 : p1;if (p.track) {let a = Math.atan2(enemy.y - p.y, enemy.x - p.x);p.vx = Math.cos(a) * 4.5;p.vy = Math.sin(a) * 4.5;}p.x += p.vx;p.y += p.vy;ctx.beginPath();ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);ctx.fillStyle = p.color;ctx.fill();ctx.closePath();if (p.type === 'kunai') {if (p.x < 0 || p.x > canvas.width) p.vx *= -1;if (p.y < 0 || p.y > canvas.height) p.vy *= -1;obstacles.forEach(o => {if (p.x > o.x && p.x < o.x + o.size && p.y > o.y && p.y < o.y + o.size) p.vy *= -1;});}if (p.type === 'gcrow') {obstacles.forEach((o, oIdx) => {if (Math.hypot(p.x - (o.x + 15), p.y - (o.y + 15)) < p.r + 15) {obstacles.splice(oIdx, 1);}});}let tgts = p.owner.isClone ? [p1, p2].filter(b => b.id !== p.owner.id) : [enemy];tgts.forEach(t => {if (Math.hypot(p.x - t.x, p.y - t.y) < p.r + t.radius) {t.damage(p.dmg, p.owner);projectiles.splice(idx, 1);}});if (p.type !== 'kunai' && (p.x < -40 || p.x > canvas.width + 40 || p.y < -40 || p.y > canvas.height + 40)) {projectiles.splice(idx, 1);}});// 刷新網頁 HUD 數值document.getElementById('p1Txt').innerText = p1.hp;document.getElementById('p2Txt').innerText = p2.hp;document.getElementById('p1Bar').style.width = (p1.hp / 5000 * 100) + '%';document.getElementById('p2Bar').style.width = (p2.hp / 5000 * 100) + '%';// 勝負宣告與回主選單if (p1.hp <= 0 || p2.hp <= 0) {gameActive = false;ctx.restore();ctx.fillStyle = 'rgba(0,0,0,0.85)';ctx.fillRect(0, 0, canvas.width, canvas.height);ctx.font = 'bold 35px sans-serif';ctx.textAlign = 'center';ctx.fillStyle = '#ffffff';let winTxt = (p1.hp <= 0 && p2.hp <= 0) ? '雙方同歸於盡，平手！' : (p1.hp <= 0 ? '藍方 (P2) 獲得勝利！' : '紅方 (P1) 獲得勝利！');ctx.fillText(winTxt, canvas.width / 2, canvas.height / 2);ctx.font = '20px sans-serif';ctx.fillStyle = '#aaaaaa';ctx.fillText('3 秒後自動重設並回到主選單...', canvas.width / 2, canvas.height / 2 + 50);setTimeout(() => {ctx.fillStyle = '#18181c';ctx.fillRect(0, 0, canvas.width, canvas.height);panel.style.opacity = '1';panel.style.pointerEvents = 'auto';}, 3000);return;}ctx.restore();requestAnimationFrame(loop);}startBtn.addEventListener('click', () => {projectiles = [];obstacles = [];zones = [];ninjaClone = null;msg.innerText = '';// 鎖定選角面板panel.style.opacity = '0';panel.style.pointerEvents = 'none';// 建立起始球體p1 = new Ball(1, 150, 250, '#ff4a4a', p1Select.value);p2 = new Ball(2, 650, 250, '#4a90e2', p2Select.value);gameActive = true;loop();});
