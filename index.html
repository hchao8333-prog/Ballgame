<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>雙球生存對決-下拉防卡版</title>
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; background: #111; color: #fff; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        #selectionScreen { display: flex; flex-direction: column; align-items: center; justify-content: center; width: 100vw; height: 100vh; background: #111; z-index: 10; position: absolute; padding: 20px; }
        .player-menu-box { width: 100%; max-width: 300px; background: #222; border-radius: 12px; padding: 15px; margin: 10px 0; text-align: center; }
        .p1-box { border: 2px solid #ff4757; } .p2-box { border: 2px solid #2ed573; }
        /* 呼叫系統內建選單，防攔截 */
        select { width: 100%; padding: 12px; font-size: 16px; font-weight: bold; background: #333; color: #fff; border: 1px solid #555; border-radius: 8px; margin-top: 5px; }
        #startBtn { margin-top: 20px; width: 100%; max-width: 200px; padding: 14px; font-size: 18px; font-weight: bold; background: #f1c40f; border: none; border-radius: 25px; color: #000; }
        #gameScreen { display: none; flex-direction: column; align-items: center; width: 100vw; }
        #scoreboard { display: flex; justify-content: space-around; width: 100%; max-width: 500px; font-size: 14px; font-weight: bold; margin-bottom: 5px; text-align: center; }
        canvas { border: 2px solid #fff; background: #050505; max-width: 95vw; max-height: 65vh; }
        #gameOverScreen { display: none; position: absolute; background: rgba(0,0,0,0.95); width: 80%; max-width: 280px; padding: 20px; border-radius: 12px; text-align: center; border: 2px solid #fff; z-index: 20; }
    </style>
</head>
<body>
    <div id="selectionScreen">
        <h3 style="color:#f1c40f; margin:0 0 10px 0;">⚔️ 請選取雙方技能 ⚔️</h3>
        
        <div class="player-menu-box p1-box">
            <h4 style="color:#ff4757; margin:0 0 8px 0;">🔴 玩家 1 (紅球)</h4>
            <select id="p1Select">
                <option value="shield">🛡️ 護盾 (無敵 5 秒)</option>
                <option value="giant">💪 巨大 (變大加速 10 秒)</option>
                <option value="crow">🦅 烏鴉 (穿牆追蹤敵人)</option>
                <option value="block">🧱 障礙 (5秒放一個方塊)</option>
                <option value="shrine">🌸 祈禱 (陣內回血加速)</option>
            </select>
        </div>

        <div class="player-menu-box p2-box">
            <h4 style="color:#2ed573; margin:0 0 8px 0;">🟢 玩家 2 (綠球)</h4>
            <select id="p2Select">
                <option value="shield">🛡️ 護盾 (無敵 5 秒)</option>
                <option value="giant" selected>💪 巨大 (變大加速 10 秒)</option>
                <option value="crow">🦅 烏鴉 (穿牆追蹤敵人)</option>
                <option value="block">🧱 障礙 (5秒放一個方塊)</option>
                <option value="shrine">🌸 祈禱 (陣內回血加速)</option>
            </select>
        </div>

        <button id="startBtn" onclick="startGame()">⚔️ 開始戰鬥 ⚔️</button>
    </div>

    <div id="gameScreen">
        <div id="scoreboard">
            <div style="color:#ff4757">紅球: <span id="hp1">2000</span> HP<div id="st1" style="font-size:10px;color:#aaa"></div></div>
            <div style="color:#2ed573">綠球: <span id="hp2">2000</span> HP<div id="st2" style="font-size:10px;color:#aaa"></div></div>
        </div>
        <canvas id="gameCanvas" width="600" height="400"></canvas>
    </div>

    <div id="gameOverScreen">
        <h3 id="winnerText" style="color:#f1c40f;margin:0 0 15px 0;"></h3>
        <button onclick="backToSelection()" style="padding:10px 20px; font-weight:bold; border-radius:5px; border:none; background:#fff; color:#000;">返回選擇</button>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas"), ctx = canvas.getContext("2d");
        const selectionScreen = document.getElementById("selectionScreen"), gameScreen = document.getElementById("gameScreen"), gameOverScreen = document.getElementById("gameOverScreen"), winnerText = document.getElementById("winnerText");
        const hp1Display = document.getElementById("hp1"), hp2Display = document.getElementById("hp2"), st1Display = document.getElementById("st1"), st2Display = document.getElementById("st2");
        let gameActive = false, obstacles = [], crows = [], zones = [], timers = [];
        const centerBox = { x: 260, y: 160, width: 80, height: 80, color: "#f1c40f" };

        class Crow {
            constructor(x, y, t, c) { this.x = x; this.y = y; this.target = t; this.color = c; this.radius = 6; this.speed = 3.5; }
            move() { let dx = this.target.x - this.x, dy = this.target.y - this.y, d = Math.sqrt(dx*dx + dy*dy); if (d > 0) { this.x += (dx/d)*this.speed; this.y += (dy/d)*this.speed; } }
            draw() { ctx.beginPath(); ctx.arc(this.x, this.y, this.radius, 0, Math.PI*2); ctx.fillStyle = this.color === "#ff4757" ? "#ff7675" : "#55efc4"; ctx.fill(); ctx.closePath(); ctx.fillStyle = "#fff"; ctx.font = "10px sans-serif"; ctx.fillText("🦅", this.x - 6, this.y + 4); }
        }

        class Ball {
            constructor(x, y, c, n, h, st) { this.x = x; this.y = y; this.baseRadius = 15; this.radius = 15; this.color = c; this.vx = c === "#ff4757" ? 5 : -5; this.vy = 4; this.baseSpeedX = Math.abs(this.vx); this.baseSpeedY = Math.abs(this.vy); this.hp = 2000; this.name = n; this.hpElement = h; this.statusElement = st; this.isInvincible = false; this.isInShrine = false; }
            draw() { ctx.beginPath(); ctx.arc(this.x, this.y, this.radius, 0, Math.PI*2); ctx.fillStyle = this.color; ctx.fill(); ctx.closePath(); if (this.isInvincible) { ctx.beginPath(); ctx.arc(this.x, this.y, this.radius + 6, 0, Math.PI*2); ctx.strokeStyle = "#00d2d3"; ctx.lineWidth = 3; ctx.stroke(); ctx.closePath(); } }
            move() { let currentSpeedMultiplier = this.isInShrine ? 1.5 : 1.0; this.x += this.vx * currentSpeedMultiplier * (this.isGiant ? 0.75 : 0.5); this.y += this.vy * currentSpeedMultiplier * (this.isGiant ? 0.75 : 0.5); if (this.x - this.radius < 0) { this.x = this.radius; this.vx = -this.vx; } else if (this.x + this.radius > canvas.width) { this.x = canvas.width - this.radius; this.vx = -this.vx; } if (this.y - this.radius < 0) { this.y = this.radius; this.vy = -this.vy; } else if (this.y + this.radius > canvas.height) { this.y = canvas.height - this.radius; this.vy = -this.vy; } }
            takeDamage(a) { if (this.isInvincible) return; this.hp -= a; if (this.hp < 0) this.hp = 0; this.hpElement.innerText = this.hp; if (this.hp <= 0 && gameActive) endGame(this.name === "P1" ? "P2 獲勝！" : "P1 獲勝！"); }
            heal(a) { this.hp += a; if (this.hp > 2000) this.hp = 2000; this.hpElement.innerText = this.hp; }
        }
        let b1, b2;

        function setupSkill(b, e, s) {
            if (s === 'shield') { b.statusElement.innerText = "🛡️ 冷卻中"; let t = setInterval(() => { if (!gameActive) return; b.isInvincible = true; b.statusElement.innerText = "✨ 無敵中!"; let it = setTimeout(() => { b.isInvincible = false; b.statusElement.innerText = "🛡️ 冷卻中"; }, 5000); timers.push(it); }, 10000); timers.push(t); } 
            else if (s === 'giant') { b.statusElement.innerText = "💪 冷卻中"; let t = setInterval(() => { if (!gameActive) return; b.isGiant = true; b.radius = b.baseRadius * 2; b.vx = b.vx > 0 ? b.baseSpeedX * 1.5 : -b.baseSpeedX * 1.5; b.vy = b.vy > 0 ? b.baseSpeedY * 1.5 : -b.baseSpeedY * 1.5; b.statusElement.innerText = "⚡ 巨大化!"; let it = setTimeout(() => { b.isGiant = false; b.radius = b.baseRadius; b.vx = b.vx > 0 ? b.baseSpeedX : -b.baseSpeedX; b.vy = b.vy > 0 ? b.baseSpeedY : -b.baseSpeedY; b.statusElement.innerText = "💪 冷卻中"; }, 10000); timers.push(it); }, 15000); timers.push(t); } 
            else if (s === 'crow') { b.statusElement.innerText = "🦅 召喚中"; let t = setInterval(() => { if (!gameActive) return; crows.push(new Crow(b.x, b.y, e, b.color)); }, 5000); timers.push(t); } 
            else if (s === 'block') { b.statusElement.innerText = "🧱 製造中"; let t = setInterval(() => { if (!gameActive) return; let size = b.radius * 2; obstacles.push({ x: b.x - b.radius, y: b.y - b.radius, width: size, height: size, color: b.color === "#ff4757" ? "#b2bec3" : "#636e72" }); }, 5000); timers.push(t); }
            else if (s === 'shrine') { b.statusElement.innerText = "🌸 祈禱冷卻中"; let t = setInterval(() => { if (!gameActive) return; let zX = Math.random() * (canvas.width - 160) + 80, zY = Math.random() * (canvas.height - 160) + 80; zones.push({ x: zX, y: zY, radius: 60, owner: b }); b.statusElement.innerText = "🌸 結界展開!"; let it = setTimeout(() => { zones = zones.filter(z => z.owner !== b); b.statusElement.innerText = "🌸 祈禱冷卻中"; }, 5000); timers.push(it); }, 10000); timers.push(t); }
        }

        function startGame() {
            const s1 = document.getElementById("p1Select").value; const s2 = document.getElementById("p2Select").value;
            selectionScreen.style.display = "none"; gameScreen.style.display = "flex"; gameOverScreen.style.display = "none"; gameActive = true;
            b1 = new Ball(100, 100, "#ff4757", "P1", hp1Display, st1Display); b2 = new Ball(500, 300, "#2ed573", "P2", hp2Display, st2Display);
            hp1Display.innerText = 2000; hp2Display.innerText = 2000; obstacles = [centerBox]; crows = []; zones = []; timers = [];
            setupSkill(b1, b2, s1); setupSkill(b2, b1, s2); gameLoop();
        }

        function checkBallRectCollision(b, r) { let cx = Math.max(r.x, Math.min(b.x, r.x + r.width)), cy = Math.max(r.y, Math.min(b.y, r.y + r.height)), dx = b.x - cx, dy = b.y - cy, dSq = (dx*dx)+(dy*dy); if (dSq < (b.radius*b.radius)) { let d = Math.sqrt(dSq); if (d === 0) return; b.x += (dx/d)*(b.radius-d); b.y += (dy/d)*(b.radius-d); if (Math.abs(dx/d) > Math.abs(dy/d)) { b.vx = -b.vx; } else { b.vy = -b.vy; } } }
        function checkBallCollision(ball1, ball2) { let dx = ball2.x - ball1.x, dy = ball2.y - ball1.y, d = Math.sqrt(dx*dx + dy*dy), minDist = ball1.radius + ball2.radius; if (d < minDist) { let dmg1 = Math.floor(Math.random()*151)+150, dmg2 = Math.floor(Math.random()*151)+150; ball1.takeDamage(dmg1); ball2.takeDamage(dmg2); let nx = dx/d, ny = dy/d, o = minDist - d; ball1.x -= nx*(o/2); ball1.y -= ny*(o/2); ball2.x += nx*(o/2); ball2.y += ny*(o/2); let kx = ball1.vx - ball2.vx, ky = ball1.vy - ball2.vy, p = nx*kx + ny*ky; if (p > 0) { ball1.vx -= p*nx; ball1.vy -= p*ny; ball2.vx += p*nx; ball2.vy += p*ny; } } }
        function gameLoop() { if (!gameActive) return; ctx.clearRect(0, 0, canvas.width, canvas.height); b1.isInShrine = false; b2.isInShrine = false; zones.forEach(z => { ctx.beginPath(); ctx.arc(z.x, z.y, z.radius, 0, Math.PI*2); ctx.fillStyle = "rgba(255, 121, 121, 0.15)"; ctx.fill(); ctx.strokeStyle = "rgba(255, 159, 243, 0.6)"; ctx.lineWidth = 2; ctx.stroke(); ctx.closePath(); ctx.fillStyle = "rgba(255, 255, 255, 0.4)"; ctx.font = "12px sans-serif"; ctx.fillText("🌸", z.x - 6, z.y + 5); let zdx = z.owner.x - z.x, zdy = z.owner.y - z.y, zdist = Math.sqrt(zdx*zdx + zdy*zdy); if (zdist < z.radius) { z.owner.isInShrine = true; z.owner.heal(3); } }); obstacles.forEach(r => { ctx.fillStyle = r.color; ctx.fillRect(r.x, r.y, r.width, r.height); checkBallRectCollision(b1, r); checkBallRectCollision(b2, r); }); for (let i = crows.length - 1; i >= 0; i--) { let c = crows[i]; c.move(); c.draw(); let tdx = c.target.x - c.x, tdy = c.target.y - c.y, td = Math.sqrt(tdx*tdx + tdy*tdy); if (td < c.target.radius + c.radius) { c.target.takeDamage(220); crows.splice(i, 1); } } b1.move(); b2.move(); checkBallCollision(b1, b2); b1.draw(); b2.draw(); requestAnimationFrame(gameLoop); }
        function endGame(m) { gameActive = false; timers.forEach(t => { clearInterval(t); clearTimeout(t); }); winnerText.innerText = m; gameOverScreen.style.display = "block"; }
        function backToSelection() { gameOverScreen.style.display = "none"; gameScreen.style.display = "none"; selectionScreen.style.display = "flex"; }
    </script>
</body>
</html>

<!-- 以下為音樂音效補丁引擎：直接加在最下面即可 -->
<!-- ========================================== -->
<script>
    // 🎵 Web Audio API 復古合成音效引擎
    let audioCtx = null, bgmInterval = null;
    
    function initAudio() { 
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); 
    }
    
    function playSound(freq, type, duration, vol) {
        if (!audioCtx) return; 
        try {
            let osc = audioCtx.createOscillator(), gain = audioCtx.createGain();
            osc.type = type; 
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(vol, audioCtx.currentTime); 
            gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duration);
            osc.connect(gain); 
            gain.connect(audioCtx.destination); 
            osc.start(); 
            osc.stop(audioCtx.currentTime + duration);
        } catch(e){}
    }
    
    // 循環播放 8-bit 電子背景音樂
    function startBGM() {
        if (bgmInterval) clearInterval(bgmInterval);
        let notes = [261.63, 293.66, 329.63, 349.23, 392.00, 349.23, 329.63, 293.66]; // 基礎音階
        let step = 0;
        bgmInterval = setInterval(() => {
            if (!gameActive) return;
            // 播放旋律
            playSound(notes[step % notes.length], 'square', 0.15, 0.02);
            // 每4拍加一個重低音
            if(step % 4 === 0) playSound(80, 'triangle', 0.12, 0.08); 
            step++;
        }, 220);
    }

    // 覆寫並強植注入原本的 startGame 與 endGame 函數，確保音效啟動
    const originalStartGame = window.startGame;
    window.startGame = function() {
        initAudio(); 
        if (audioCtx && audioCtx.state === 'suspended') {
            audioCtx.resume();
        }
        // 先執行原本的開始邏輯
        if (typeof originalStartGame === 'function') {
            originalStartGame();
        } else {
            // 如果原本的沒跑，強制手動啟動
            const s1 = document.getElementById("p1Select").value; 
            const s2 = document.getElementById("p2Select").value;
            selectionScreen.style.display = "none"; gameScreen.style.display = "flex"; gameOverScreen.style.display = "none"; gameActive = true;
            b1 = new Ball(100, 100, "#ff4757", "P1", hp1Display, st1Display); 
            b2 = new Ball(500, 300, "#2ed573", "P2", hp2Display, st2Display);
            hp1Display.innerText = 2000; hp2Display.innerText = 2000; obstacles = [centerBox]; crows = []; zones = []; timers = [];
            setupSkill(b1, b2, s1); setupSkill(b2, b1, s2); gameLoop();
        }
        startBGM(); // 啟動背景音樂
    };

    const originalEndGame = window.endGame;
    window.endGame = function(m) {
        clearInterval(bgmInterval);
        playSound(150, 'sawtooth', 0.6, 0.15); // 播放失敗/結束音效
        if (typeof originalEndGame === 'function') {
            originalEndGame(m);
        } else {
            gameActive = false;
            timers.forEach(t => { clearInterval(t); clearTimeout(t); });
            winnerText.innerText = m; gameOverScreen.style.display = "block";
        }
    };

    // 重新注入技能與碰撞音效
    const originalSetupSkill = window.setupSkill;
    window.setupSkill = function(b, e, s) {
        if (typeof originalSetupSkill === 'function') originalSetupSkill(b, e, s);
        // 每當技能觸發時，多加一段聲音
        if (s === 'shield') { let t = setInterval(() => { if (gameActive) playSound(880, 'sine', 0.3, 0.05); }, 10000); timers.push(t); }
        else if (s === 'giant') { let t = setInterval(() => { if (gameActive) playSound(220, 'sawtooth', 0.4, 0.04); }, 15000); timers.push(t); }
        else if (s === 'block') { let t = setInterval(() => { if (gameActive) playSound(440, 'triangle', 0.1, 0.03); }, 5000); timers.push(t); }
    };

    // 每格監聽特殊碰撞並發出聲音
    let lastB1Hp = 2000, lastB2Hp = 2000;
    let oldGameLoop = window.gameLoop;
    window.gameLoop = function() {
        if (!gameActive) return;
        if (typeof oldGameLoop === 'function') oldGameLoop();
        
        // 偵測血量變化來播放受傷/碰撞/補血音效
        if (window.b1 && window.b2) {
            if (b1.hp < lastB1Hp) { playSound(587.33, 'square', 0.1, 0.05); } // P1受傷/被烏鴉炸
            if (b2.hp < lastB2Hp) { playSound(587.33, 'square', 0.1, 0.05); } // P2受傷/被烏鴉炸
            if (b1.isInShrine && Math.random() < 0.1) { playSound(987.77, 'sine', 0.03, 0.02); } // 巫女補血綠光音效
            if (b2.isInShrine && Math.random() < 0.1) { playSound(987.77, 'sine', 0.03, 0.02); }
            lastB1Hp = b1.hp; lastB2Hp = b2.hp;
        }
        
        // 簡單的牆壁反彈音效偵測
        if (window.b1 && (b1.x <= b1.radius+5 || b1.x >= canvas.width-b1.radius-5 || b1.y <= b1.radius+5 || b1.y >= canvas.height-b1.radius-5)) {
            playSound(349.23, 'triangle', 0.04, 0.03);
        }
        if (window.b2 && (b2.x <= b2.radius+5 || b2.x >= canvas.width-b2.radius-5 || b2.y <= b2.radius+5 || b2.y >= canvas.height-b2.radius-5)) {
            playSound(349.23, 'triangle', 0.04, 0.03);
        }
    };
</script>
