<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="utf-8">
    <title>物理生死鬥</title>
    <style>
        body { background:#121214; color:#fff; font-family:sans-serif; display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; margin:0; }
        h1 { color:#00ffcc; text-shadow:0 0 10px rgba(0, 255, 204, 0.5); }
        .panel { background:#1e1e24; padding:15px 25px; border-radius:12px; display:flex; gap:20px; align-items:center; margin-bottom:20px; border:1px solid #333; }
        select, button { background:#2a2a32; color:white; border:1px solid #555; padding:8px 12px; border-radius:6px; font-size:16px; cursor:pointer; }
        #startBtn { background:linear-gradient(135deg, #00ffcc, #00bfff); color:#121214; font-weight:bold; border:none; padding:10px 25px; }
        .hud { display:flex; justify-content:space-between; width:800px; margin-bottom:5px; font-weight:bold; }
        .hp-box { width:45%; background:#333; height:16px; border-radius:8px; overflow:hidden; border:1px solid #555; }
        .hp-bar { height:100%; width:100%; }
        #p1Bar { background:#ff4a4a; } #p2Bar { background:#4a90e2; }
        #container { position:relative; background:#18181c; border-radius:10px; border:2px solid #333; }
        #msg { position:absolute; top:20px; left:50%; transform:translateX(-50%); font-size:24px; font-weight:bold; text-shadow:0 0 8px black; pointer-events:none; z-index:10; }
    </style>
</head>
<body>

    <h1>《殘血反殺！全自動物理亂彈生死鬥》</h1>

    <div id="panel" class="panel">
        <div style="color:#ff4a4a; font-weight:bold;">P1 紅方: 
            <select id="p1Select">
                <option value="ninja">🥷 忍者</option>
                <option value="giant">🧱 巨大</option>
                <option value="maiden">⛩️ 巫女</option>
                <option value="blocker">🚧 障礙物</option>
                <option value="crow">🪶 烏鴉</option>
                <option value="invincible">🛡️ 無敵</option>
            </select>
        </div>
        <button id="startBtn">START BATTLE</button>
        <div style="color:#4a90e2; font-weight:bold;">P2 藍方: 
            <select id="p2Select">
                <option value="giant">🧱 巨大</option>
                <option value="ninja">🥷 忍者</option>
                <option value="maiden">⛩️ 巫女</option>
                <option value="blocker">🚧 障礙物</option>
                <option value="crow">🪶 烏鴉</option>
                <option value="invincible">🛡️ 無敵</option>
            </select>
        </div>
    </div>

    <div id="hud" class="hud">
        <div style="color:#ff4a4a;">P1 HP: <span id="p1Txt">5000</span></div>
        <div style="color:#4a90e2;">P2 HP: <span id="p2Txt">5000</span></div>
    </div>
    <div id="bars" class="hud" style="margin-top:-5px; margin-bottom:15px;">
        <div class="hp-box"><div id="p1Bar" class="hp-bar"></div></div>
        <div class="hp-box"><div id="p2Bar" class="hp-bar"></div></div>
    </div>

    <div id="container">
        <div id="msg"></div>
        <canvas id="ctx" width="800" height="500"></canvas>
    </div>

<script>
const canvas = document.getElementById('ctx');
const ctx = canvas.getContext('2d');
const startBtn = document.getElementById('startBtn');
const p1Select = document.getElementById('p1Select');
const p2Select = document.getElementById('p2Select');
const msg = document.getElementById('msg');
const panel = document.getElementById('panel');

ctx.fillStyle = '#18181c';
ctx.fillRect(0, 0, canvas.width, canvas.height);

let gameActive = false, p1 = null, p2 = null, projectiles = [], obstacles = [], zones = [], shake = 0, ninjaClone = null;

function createBall(id, x, y, color, type) {
    let angle = (id === 1) ? (Math.random() * 0.6 - 0.3) : (Math.random() * 0.6 + Math.PI - 0.3);
    return {
        id: id, x: x, y: y, radius: 25, color: color, type: type,
        hp: 5000, mass: 1, timer: 0, isAwake: false, isInv: false, invTime: 0, isClone: false,
        vx: Math.cos(angle) * 6, vy: Math.sin(angle) * 6
    };
}

function updateBall(b) {
    if (b.hp <= 1000 && !b.isAwake) {
        b.isAwake = true;
        msg.innerText = (b.id === 1 ? '紅方' : '藍方') + ' 殘血覺醒！';
        msg.style.color = b.color;
        setTimeout(() => { msg.innerText = ''; }, 2000);
        
        if (b.type === 'blocker') {
            let enemy = (b.id === 1) ? p2 : p1;
            obstacles.forEach(o => {
                if (Math.hypot(enemy.x - (o.x + 15), enemy.y - (o.y + 15)) < 150) {
                    enemy.hp = Math.max(0, enemy.hp - 400);
                    let a = Math.atan2(enemy.y - (o.y + 15), enemy.x - (o.x + 15));
                    enemy.vx += Math.cos(a) * 10; enemy.vy += Math.sin(a) * 10;
                }
            });
            obstacles = []; shake = 10;
        }
        
        if (b.type === 'ninja' && !b.isClone) {
            ninjaClone = createBall(b.id, b.x, b.y, '#555555', 'ninja');
            ninjaClone.isClone = true; ninjaClone.hp = b.hp; ninjaClone.vx = -b.vx; ninjaClone.vy = -b.vy;
            setTimeout(() => { ninjaClone = null; }, 10000);
        }
    }

    if (b.isInv) { b.invTime--; if (b.invTime <= 0) b.isInv = false; }
    b.timer++;
    
    if (b.type === 'crow' && b.timer % 100 === 0) {
        let enemy = (b.id === 1) ? p2 : p1;
        if (!b.isAwake) { projectiles.push({ type: 'crow', x: b.x, y: b.y, vx: 0, vy: 0, r: 8, color: '#9b59b6', owner: b, dmg: 150, track: true }); }
        else { let a = Math.atan2(b.vy, b.vx); projectiles.push({ type: 'gcrow', x: b.x, y: b.y, vx: Math.cos(a) * 9, vy: Math.sin(a) * 9, r: 25, color: '#4a148c', owner: b, dmg: 450, track: false }); }
    }

    if (b.type === 'ninja' && b.timer % 120 === 0) {
        let enemy = (b.id === 1) ? p2 : p1; let a = Math.atan2(enemy.y - b.y, enemy.x - b.x);
        for(let i = 0; i < 3; i++) { projectiles.push({ type: 'kunai', x: b.x, y: b.y, vx: Math.cos(a + (i - 1) * 0.25) * 8, vy: Math.sin(a + (i - 1) * 0.25) * 8, r: 5, color: '#e74c3c', owner: b, dmg: 100 }); }
    }

    if (b.type === 'blocker' && b.timer % 140 === 0 && !b.isAwake) {
        obstacles.push({ x: b.x - b.vx * 3, y: b.y - b.vy * 3, size: 30 }); if (obstacles.length > 5) obstacles.shift();
    }

    if (b.type === 'invincible' && b.timer % 220 === 0) { b.isInv = true; b.invTime = 120; }
    if (b.type === 'maiden' && b.timer % 180 === 0) { zones.push({ type: b.isAwake ? 'lunar' : 'shrine', x: Math.random() * 500 + 150, y: Math.random() * 300 + 100, r: b.isAwake ? 110 : 70, owner: b, duration: 240 }); }

    b.x += b.vx; b.y += b.vy;
    
    if (b.x - b.radius < 0) { b.x = b.radius; b.vx *= -1; bounceBall(b); }
    else if (b.x + b.radius > canvas.width) { b.x = canvas.width - b.radius; b.vx *= -1; bounceBall(b); }
    if (b.y - b.radius < 0) { b.y = b.radius; b.vy *= -1; bounceBall(b); }
    else if (b.y + b.radius > canvas.height) { b.y = canvas.height - b.radius; b.vy *= -1; bounceBall(b); }
}

function bounceBall(b) {
    if (b.type === 'giant') {
        let max = b.isAwake ? 2.5 : 1.6;
        if (b.radius < 25 * max) { b.radius += 0.6; b.mass += 0.05; b.vx *= 1.02; b.vy *= 1.02; }
        if (b.isAwake) shake = 6;
    }
}

function damageBall(b, amt, atk) {
    if (b.isInv) { if (b.isAwake && atk && atk !== b) { damageBall(atk, amt, b); } return; }
    b.hp = Math.max(0, b.hp - amt);
}

function drawBall(b) {
    ctx.beginPath(); ctx.arc(b.x, b.y, b.radius, 0, Math.PI * 2); ctx.fillStyle = b.color; ctx.fill(); ctx.closePath();
    if (b.isInv) { ctx.beginPath(); ctx.arc(b.x, b.y, b.radius + 8, 0, Math.PI * 2); ctx.strokeStyle = '#f1c40f'; ctx.lineWidth = 3; ctx.stroke(); ctx.closePath(); }
}

function collideBalls(b1, b2) {
    let d = Math.hypot(b2.x - b1.x, b2.y - b1.y);
    if (d < b1.radius + b2.radius) {
        let ov = (b1.radius + b2.radius) - d, nx = (b2.x - b1.x) / d, ny = (b2.y - b1.y) / d;
        b1.x -= nx * ov * 0.5; b1.y -= ny * ov * 0.5; b2.x += nx * ov * 0.5; b2.y += ny * ov * 0.5;
        let kx = b1.vx - b2.vx, ky = b1.vy - b2.vy, p = 2 * (nx * kx + ny * ky) / (b1.mass + b2.mass);
        b1.vx -= p * b2.mass * nx; b1.vy -= p * b2.mass * ny; b2.vx += p * b1.mass * nx; b2.vy += p * b1.mass * ny;
        let spd = Math.hypot(kx, ky); damageBall(b1, Math.round(25 * b2.mass * (spd / 6)), b2); damageBall(b2, Math.round(25 * b1.mass * (spd / 6)), b1); shake = Math.min(spd, 8);
    }
}

function collideObs(b) {
    obstacles.forEach(o => {
        let cx = Math.max(o.x, Math.min(b.x, o.x + o.size)), cy = Math.max(o.y, Math.min(b.y, o.y + o.size));
        let dx = b.x - cx, dy = b.y - cy, dist = Math.hypot(dx, dy);
        if (dist < b.radius) {
            if (Math.abs(dx) > Math.abs(dy)) { b.vx *= -1; b.x = dx > 0 ? cx + b.radius : cx - b.radius; }
            else { b.vy *= -1; b.y = dy > 0 ? cy + b.radius : cy - b.radius; }
            bounceBall(b);
        }
    });
}

function loop() {
    if (!gameActive) return;
    ctx.fillStyle = '#18181c'; ctx.fillRect(0, 0, canvas.width, canvas.height); ctx.save();
    if (shake > 0) { ctx.translate((Math.random() - 0.5) * shake, (Math.random() - 0.5) * shake); shake *= 0.9; if (shake < 0.2) shake = 0; }

    zones.forEach((z, idx) => {
        z.duration--; if (z.duration <= 0) { zones.splice(idx, 1); return; }
        ctx.beginPath(); ctx.arc(z.x, z.y, z.r, 0, Math.PI * 2); ctx.fillStyle = (z.type === 'lunar') ? 'rgba(155,89,182,0.15)' : 'rgba(46,204,113,0.15)'; ctx.fill(); ctx.closePath();
        [p1, p2, ninjaClone].forEach(b => {
            if (!b) return;
            if (b.type === 'maiden' && b === z.owner) {
                if (Math.hypot(b.x - z.x, b.y - z.y) < z.r) { b.hp = Math.min(5000, b.hp + (z.type === 'lunar' ? 7 : 4)); }
                if (z.type === 'lunar') { ctx.beginPath(); ctx.moveTo(z.x, z.y); ctx.lineTo(b.x, b.y); ctx.strokeStyle = '#ffffff'; ctx.stroke(); }
            }
            if (z.type === 'lunar' && b !== z.owner && Math.hypot(b.x - z.x, b.y - z.y) < z.r) { damageBall(b, 2, z.owner); }
});});obstacles.forEach(o => { ctx.fillStyle = '#7f8c8d'; ctx.fillRect(o.x, o.y, o.size, o.size); });updateBall(p1); updateBall(p2);if (ninjaClone) { updateBall(ninjaClone); drawBall(ninjaClone); collideBalls(ninjaClone, p2); collideObs(ninjaClone); }collideBalls(p1, p2); collideObs(p1); collideObs(p2);drawBall(p1); drawBall(p2);projectiles.forEach((p, idx) => {let enemy = (p.owner.id === 1) ? p2 : p1;if (p.track) { let a = Math.atan2(enemy.y - p.y, enemy.x - p.x); p.vx = Math.cos(a) * 4.5; p.vy = Math.sin(a) * 4.5; }p.x += p.vx; p.y += p.vy;ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2); ctx.fillStyle = p.color; ctx.fill(); ctx.closePath();if (p.type === 'kunai') {if (p.x < 0 || p.x > canvas.width) p.vx *= -1; if (p.y < 0 || p.y > canvas.height) p.vy *= -1;obstacles.forEach(o => { if (p.x > o.x && p.x < o.x + o.size && p.y > o.y && p.y < o.y + o.size) p.vy *= -1; });}if (p.type === 'gcrow') { obstacles.forEach((o, oIdx) => { if (Math.hypot(p.x - (o.x + 15), p.y - (o.y + 15)) < p.r + 15) { obstacles.splice(oIdx, 1); } }); }let tgts = p.owner.isClone ? [p1, p2].filter(b => b.id !== p.owner.id) : [enemy];tgts.forEach(t => { if (Math.hypot(p.x - t.x, p.y - t.y) < p.r + t.radius) { damageBall(t, p.dmg, p.owner); projectiles.splice(idx, 1); } });if (p.type !== 'kunai' && (p.x < -40 || p.x > canvas.width + 40 || p.y < -40 || p.y > canvas.height + 40)) { projectiles.splice(idx, 1); }});document.getElementById('p1Txt').innerText = p1.hp; document.getElementById('p2Txt').innerText = p2.hp;document.getElementById('p1Bar').style.width = (p1.hp / 5000 * 100) + '%'; document.getElementById('p2Bar').style.width = (p2.hp / 5000 * 100) + '%';if (p1.hp <= 0 || p2.hp <= 0) {gameActive = false; ctx.restore(); ctx.fillStyle = 'rgba(0,0,0,0.85)'; ctx.fillRect(0, 0, canvas.width, canvas.height);ctx.font = 'bold 35px sans-serif'; ctx.textAlign = 'center'; ctx.fillStyle = '#ffffff';let winTxt = (p1.hp <= 0 && p2.hp <= 0) ? '雙方同歸於盡，平手！' : (p1.hp <= 0 ? '藍方 (P2) 獲得勝利！' : '紅方 (P1) 獲得勝利！');ctx.fillText(winTxt, canvas.width / 2, canvas.height / 2);ctx.font = '20px sans-serif'; ctx.fillStyle = '#aaaaaa'; ctx.fillText('3 秒後自動重設並回到主選單...', canvas.width / 2, canvas.height / 2 + 50);setTimeout(() => { ctx.fillStyle = '#18181c'; ctx.fillRect(0, 0, canvas.width, canvas.height); panel.style.opacity = '1'; panel.style.pointerEvents = 'auto'; }, 3000);return;}ctx.restore(); requestAnimationFrame(loop);}startBtn.addEventListener('click', () => {projectiles = []; obstacles = []; zones = []; ninjaClone = null; msg.innerText = '';panel.style.opacity = '0'; panel.style.pointerEvents = 'none';p1 = createBall(1, 150, 250, '#ff4a4a', p1Select.value); p2 = createBall(2, 650, 250, '#4a90e2', p2Select.value);gameActive = true; loop();});」
