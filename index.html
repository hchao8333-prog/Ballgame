<!DOCTYPE html><html><head><meta charset="utf-8"><title>生死鬥</title><style>body{background:#121214;color:#fff;font-family:sans-serif;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;margin:0}.p{background:#1e1e24;padding:15px;border-radius:12px;display:flex;gap:15px;align-items:center;margin-bottom:15px}select,button{background:#2a2a32;color:#fff;border:1px solid #555;padding:8px;border-radius:6px;font-size:16px;cursor:pointer}#startBtn{background:linear-gradient(135deg,#00ffcc,#00bfff);color:#121214;font-weight:bold;border:none}#c{background:#18181c;border:2px solid #333;border-radius:10px}</style></head><body><h1>《全自動物理亂彈生死鬥》</h1><div class="p"><div style="color:#ff4a4a;font-weight:bold">P1: <select id="s1"><option value="ninja">🥷 忍者</option><option value="giant">🧱 巨大</option><option value="maiden">⛩️ 巫女</option><option value="blocker">🚧 障礙物</option><option value="crow">🪶 烏鴉</option><option value="invincible">🛡️ 無敵</option></select></div><button id="startBtn">START BATTLE</button><div style="color:#4a90e2;font-weight:bold">P2: <select id="s2"><option value="giant">🧱 巨大</option><option value="ninja">🥷 忍者</option><option value="maiden">⛩️ 巫女</option><option value="blocker">🚧 障礙物</option><option value="crow">🪶 烏鴉</option><option value="invincible">🛡️ 無敵</option></select></div></div><div style="font-size:18px;font-weight:bold;width:800px;display:flex;justify-content:space-between;margin-bottom:10px"><div style="color:#ff4a4a">P1 HP: <span id="t1">5000</span></div><div id="m" style="font-size:22px"></div><div style="color:#4a90e2">P2 HP: <span id="t2">5000</span></div></div><canvas id="c" width="800" height="500"></canvas><script>const cv=document.getElementById('c'),x=cv.getContext('2d'),btn=document.getElementById('startBtn'),sel1=document.getElementById('s1'),sel2=document.getElementById('s2'),tx1=document.getElementById('t1'),tx2=document.getElementById('t2'),msg=document.getElementById('m'),pnl=document.querySelector('.p');let act=false,p1=null,p2=null,cl=null,projs=[],obs=[],zones=[];function bld(id,x,color,type){let a=id===1?0:Math.PI;return{id:id,x:x,y:250,r:25,c:color,t:type,hp:5000,m:1,tm:0,awk:false,inv:false,it:0,vx:Math.cos(a)*6,vy:Math.sin(a)*6}}function upd(b){if(b.hp<=1000&&!b.awk){b.awk=true;msg.innerText=(b.id===1?'紅方':'藍方')+'覺醒！';msg.style.color=b.c;setTimeout(()=>{msg.innerText=''},2000);if(b.t==='blocker'){let e=b.id===1?p2:p1;obs.forEach(o=>{if(Math.hypot(e.x-(o.x+15),e.y-(o.y+15))<150){e.hp=Math.max(0,e.hp-400);let a=Math.atan2(e.y-(o.y+15),e.x-(o.x+15));e.vx+=Math.cos(a)*10;e.vy+=Math.sin(a)*10}});obs=[]}if(b.t==='ninja'&&!b.isClone){cl=bld(b.id,b.x,'#555555','ninja');cl.y=b.y;cl.isClone=true;cl.hp=b.hp;cl.vx=-b.vx;cl.vy=-b.vy;setTimeout(()=>{cl=null},10000)}}if(b.isInv){b.it--;if(b.it<=0)b.isInv=false}b.timer++;if(b.t==='crow'&&b.timer%100===0){let e=b.id===1?p2:p1;if(!b.awk){projs.push({t:'crow',x:b.x,y:b.y,vx:0,vy:0,r:8,c:'#9b59b6',o:b,dmg:150,tk:true})}else{let a=Math.atan2(b.vy,b.vx);projs.push({t:'gcrow',x:b.x,y:b.y,vx:Math.cos(a)*9,vy:Math.sin(a)*9,r:25,c:'#4a148c',o:b,dmg:450,tk:false})}}if(b.t==='ninja'&&b.timer%120===0){let e=b.id===1?p2:p1,a=Math.atan2(e.y-b.y,e.x-b.x);for(let i=0;i<3;i++)projs.push({t:'kunai',x:b.x,y:b.y,vx:Math.cos(a+(i-1)*0.25)*8,vy:Math.sin(a+(i-1)*0.25)*8,r:5,c:'#e74c3c',o:b,dmg:100})}if(b.t==='blocker'&&b.timer%140===0&&!b.awk){obs.push({x:b.x-b.vx*3,y:b.y-b.vy*3,size:30});if(obs.length>5)obs.shift()}if(b.t==='invincible'&&b.timer%220===0){b.isInv=true;b.it=120}if(b.t==='maiden'&&b.timer%180===0){zones.push({t:b.awk?'lunar':'shrine',x:Math.random()*500+150,y:Math.random()*300+100,r:b.awk?110:70,o:b,dur:240})}b.x+=b.vx;b.y+=b.vy;if(b.x-b.r<0){b.x=b.r;b.vx*=-1;if(b.t==='giant'&&b.r<(25*(b.awk?2.5:1.6))){b.r+=0.6;b.m+=0.05;b.vx*=1.02;b.vy*=1.02}}else if(b.x+b.r>800){b.x=800-b.r;b.vx*=-1;if(b.t==='giant'&&b.r<(25*(b.awk?2.5:1.6))){b.r+=0.6;b.m+=0.05;b.vx*=1.02;b.vy*=1.02}}if(b.y-b.r<0){b.y=b.r;b.vy*=-1;if(b.t==='giant'&&b.r<(25*(b.awk?2.5:1.6))){b.r+=0.6;b.m+=0.05;b.vx*=1.02;b.vy*=1.02}}else if(b.y+b.r>500){b.y=500-b.r;b.vy*=-1;if(b.t==='giant'&&b.r<(25*(b.awk?2.5:1.6))){b.r+=0.6;b.m+=0.05;b.vx*=1.02;b.vy*=1.02}}}function dmgBall(b,amt,atk){if(b.isInv){if(b.awk&&atk&&atk!==b)dmgBall(atk,amt,b);return}b.hp=Math.max(0,b.hp-amt)}function colB(b1,b2){let d=Math.hypot(b2.x-b1.x,b2.y-b1.y);if(d<b1.r+b2.r){let ov=(b1.r+b2.r)-d,nx=(b2.x-b1.x)/d,ny=(b2.y-b1.y)/d;b1.x-=nx*ov*0.5;b1.y-=ny*ov*0.5;b2.x+=nx*ov*0.5;b2.y+=ny*ov*0.5;let kx=b1.vx-b2.vx,ky=b1.vy-b2.vy,p=2*(nx*kx+ny*ky)/(b1.m+b2.m);b1.vx-=p*b2.m*nx;b1.vy-=p*b2.m*ny;b2.vx+=p*b1.m*nx;b2.vy+=p*b1.m*ny;let s=Math.hypot(kx,ky);dmgBall(b1,Math.round(25*b2.m*(s/6)),b2);dmgBall(b2,Math.round(25*b1.m*(s/6)),b1)}}function colO(b){obs.forEach(o=>{let cx=Math.max(o.x,Math.min(b.x,o.x+o.size)),cy=Math.max(o.y,Math.min(b.y,o.y+o.size)),dx=b.x-cx,dy=b.y-cy,d=Math.hypot(dx,dy);if(d<b.r){if(Math.abs(dx)>Math.abs(dy)){b.vx*=-1;b.x=dx>0?cx+b.r:cx-b.r}else{b.vy*=-1;b.y=dy>0?cy+b.r:cy-b.r}if(b.t==='giant'&&b.r<(25*(b.awk?2.5:1.6))){b.r+=0.6;b.m+=0.05;b.vx*=1.02;b.vy*=1.02}}})}function loop(){if(!act)return;x.fillStyle='#18181c';x.fillRect(0,0,800,500);zones.forEach((z,idx)=>{z.dur--;if(z.dur<=0){zones.splice(idx,1);return}x.beginPath();x.arc(z.x,z.y,z.r,0,Math.PI*2);x.fillStyle=z.t==='lunar'?'rgba(155,89,182,0.15)':'rgba(46,204,113,0.15)';x.fill();x.closePath();[p1,p2,cl].forEach(b=>{if(!b)return;if(b.t==='maiden'&&b===z.o){if(Math.hypot(b.x-z.x,b.y-z.y)<z.r)b.hp=Math.min(5000,b.hp+(z.t==='lunar'?7:4));if(z.t==='lunar'){x.beginPath();x.moveTo(z.x,z.y);x.lineTo(b.x,b.y);x.strokeStyle='#fff';x.stroke()}}if(z.t==='lunar'&&b!==z.o&&Math.hypot(b.x-z.x,b.y-z.y)<z.r)dmgBall(b,2,z.o)})});obs.forEach(o=>{x.fillStyle='#7f8c8d';x.fillRect(o.x,o.y,o.size,o.size)});upd(p1);upd(p2);if(cl){upd(cl);x.beginPath();x.arc(cl.x,cl.y,cl.r,0,Math.PI*2);x.fillStyle=cl.c;x.fill();x.closePath();colB(cl,p2);colO(cl)}colB(p1,p2);colO(p1);colO(p2);[p1,p2].forEach(b=>{x.beginPath();x.arc(b.x,b.y,b.r,0,Math.PI*2);x.fillStyle=b.c;x.fill();x.closePath();if(b.isInv){x.beginPath();x.arc(b.x,b.y,b.r+8,0,Math.PI*2);x.strokeStyle='#f1c40f';x.lineWidth=3;x.stroke()}});projs.forEach((p,idx)=>{let e=p.o.id===1?p2:p1;if(p.tk){let a=Math.atan2(e.y-p.y,e.x-p.x);p.vx=Math.cos(a)*4.5;p.vy=Math.sin(a)*4.5}p.x+=p.vx;p.y+=p.vy;x.beginPath();x.arc(p.x,p.y,p.r,0,Math.PI*2);x.fillStyle=p.c;x.fill();x.closePath();if(p.t==='kunai'){if(p.x<0||p.x>800)p.vx*=-1;if(p.y<0||p.y>500)p.vy*=-1;obs.forEach(o=>{if(p.x>o.x&&p.x<o.x+o.size&&p.y>o.y&&p.y<o.y+o.size)p.vy*=-1})}if(p.t==='gcrow'){obs.forEach((o,oIdx)=>{if(Math.hypot(p.x-(o.x+15),p.y-(o.y+15))<p.r+15)obs.splice(oIdx,1)})}let t=p.o.isClone?[p1,p2].filter(b=>b.id!==p.o.id):[e];t.forEach(tg=>{if(Math.hypot(p.x-tg.x,p.y-tg.y)<p.r+tg.r){dmgBall(tg,p.dmg,p.o);projs.splice(idx,1)}});if(p.t!=='kunai'&&(p.x<-40||p.x>840||p.y<-40||p.y>540))projs.splice(idx,1)});tx1.innerText=p1.hp;tx2.innerText=p2.hp;document.getElementById('p1Bar').style.width=(p1.hp/5000*100)+'%';document.getElementById('p2Bar').style.width=(p2.hp/5000*100)+'%';if(p1.hp<=0||p2.hp<=0){act=false;x.fillStyle='rgba(0,0,0,0.85)';x.fillRect(0,0,800,500);x.font='bold 35px sans-serif';x.textAlign='center';x.fillStyle='#fff';x.fillText(p1.hp<=0&&p2.hp<=0?'同歸於盡，平手！':(p1.hp<=0?'藍方獲勝！':'紅方獲勝！'),400,250);setTimeout(()=>{x.fillStyle='#18181c';x.fillRect(0,0,800,500);pnl.style.opacity='1';pnl.style.pointerEvents='auto'},3000);return}requestAnimationFrame(loop)}btn.addEventListener('click',()=>{projs=[];obs=[];zones=[];cl=null;msg.innerText='';pnl.style.opacity='0';pnl.style.pointerEvents='none';p1=bld(1,150,'#ff4a4a',sel1.value);p2=bld(2,650,'#4a90e2',sel2.value);p1.timer=0;p2.timer=0;act=true;loop()});</script></body></html>
