<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>100%絕不卡死-碰撞大亂鬥</title>
    <style>
        body { margin: 0; background: #111; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; color: #fff; font-family: sans-serif; }
        #control { margin-bottom: 10px; }
        select, button { padding: 6px 12px; background: #333; color: #fff; border: 1px solid #555; cursor: pointer; }
        canvas { border: 2px solid #555; background: #000; }
        #status { font-size: 18px; margin-bottom: 10px; color: #ffeb3b; }
    </style>
</head>
<body>

    <div id="status">選擇角色並點擊開始！</div>
    <div id="control">
        紅方: 
        <select id="p1Select">
            <option value="crow">烏鴉(文字詛咒)</option>
            <option value="shield">護盾(無敵)</option>
            <option value="giant">巨大(變大)</option>
            <option value="shaman">巫女(回血陣)</option>
        </select>
        藍方: 
        <select id="p2Select">
            <option value="crow">烏鴉(文字詛咒)</option>
            <option value="shield" selected>護盾(無敵)</option>
            <option value="giant">巨大(變大)</option>
            <option value="shaman">巫女(回血陣)</option>
        </select>
        <button id="startBtn">開始</button>
    </div>
    <canvas id="gameCanvas" width="600" height="400"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

let gameRunning = false;
let p1 = null, p2 = null;

class Ball {
    constructor(x, y, color, side, type) {
        this.x = x; this.y = y; this.color = color; this.side = side; this.type = type;
        this.baseRadius = 20; this.radius = this.baseRadius;
        this.hp = 100; this.maxHp = 100;
        
        let angle = Math.random() * Math.PI * 2;
        this.vx = Math.cos(angle) * 5;
        this.vy = Math.sin(angle) * 5;

        this.timer = 0;
        this.isShielded = false;
        this.isGiant = false;
        this.halfHpTriggered = false;
    }

    get mass() { return this.radius; }

    update(enemy) {
        if (this.hp <= 0) return;

        // 半血爆發判定
        if (this.hp <= 50 && !this.halfHpTriggered) {
            this.halfHpTriggered = true;
            if (this.type === 'shaman') { // 巫女半血直接扣敵方30血
                enemy.hp = Math.max(0, enemy.hp - 30);
            }
        }

        // 基本移動
        this.x += this.vx; this.y += this.vy;

        // 牆壁反彈
        if (this.x - this.radius < 0) { this.x = this.radius; this.vx = -this.vx; }
        if (this.x + this.radius > canvas.width) { this.x = canvas.width - this.radius; this.vx = -this.vx; }
        if (this.y - this.radius < 0) { this.y = this.radius; this.vy = -this.vy; }
        if (this.y + this.radius > canvas.height) { this.y = canvas.height - this.radius; this.vy = -this.vy; }

        // 技能冷卻邏輯 (每幀計數)
        this.timer++;
        
        // 1. 烏鴉：每 10 秒 (600幀) 直接讓敵方扣血
        if (this.type === 'crow' && this.timer >= 600) {
            this.timer = 0;
            enemy.hp = Math.max(0, enemy.hp - (this.halfHpTriggered ? 20 : 10));
        }
        // 2. 護盾：每 10 秒開啟 5 秒無敵
        else if (this.type === 'shield') {
            let cycle = this.timer % 600;
            this.isShielded = (cycle < 300); // 前 5 秒無敵
        }
        // 3. 巨大：每 10 秒變大 5 秒
        else if (this.type === 'giant') {
            let cycle = this.timer % 600;
            if (cycle < 300) {
                this.isGiant = true;
                this.radius = this.baseRadius * (this.halfHpTriggered ? 2.0 : 1.5);
            } else {
                this.isGiant = false;
                this.radius = this.baseRadius;
            }
        }
        // 4. 巫女：每 5 秒 (300幀) 如果在畫面中心附近就回血
        else if (this.type === 'shaman') {
            let distToCenter = Math.hypot(this.x - 300, this.y - 200);
            if (distToCenter < 100) {
                this.hp = Math.min(this.maxHp, this.hp + 0.1); // 在中心點法陣內微量回血
            }
        }
    }

    draw() {
        if (this.hp <= 0) return;

        // 如果是巫女，在畫面中央畫一個靜態法陣
        if (this.type === 'shaman') {
            ctx.beginPath(); ctx.arc(300, 200, 100, 0, Math.PI*2);
            ctx.strokeStyle = 'rgba(255,255,255,0.05)'; ctx.stroke();
        }

        ctx.beginPath();
        ctx.arc(this.x, this.y, this.radius, 0, Math.PI*2);
        ctx.fillStyle = this.isShielded ? '#00e5ff' : this.color;
        ctx.fill();

        // 血條與文字
        ctx.fillStyle = '#fff'; ctx.font = '12px Arial'; ctx.textAlign = 'center';
        ctx.fillText(this.type.toUpperCase() + ` (${Math.floor(this.hp)})`, this.x, this.y - this.radius - 5);
    }
}

function checkCollision() {
    let dx = p2.x - p1.x, dy = p2.y - p1.y;
    let dist = Math.hypot(dx, dy);
    let minDist = p1.radius + p2.radius;

    if (dist < minDist && p1.hp > 0 && p2.hp > 0) {
        // 計算傷害（如果沒開盾）
        if (!p1.isShielded) p1.hp = Math.max(0, p1.hp - 8);
        if (!p2.isShielded) p2.hp = Math.max(0, p2.hp - 8);

        // 彈開位置修正
        let overlap = minDist - dist;
        let nx = dx / dist, ny = dy / dist;
        p1.x -= nx * overlap * 0.5; p1.y -= ny * overlap * 0.5;
        p2.x += nx * overlap * 0.5; p2.y += ny * overlap * 0.5;

        // 速度反轉
        let kx = p1.vx - p2.vx, ky = p1.vy - p2.vy;
        let p = 2 * (nx * kx + ny * ky) / (p1.mass + p2.mass);
        p1.vx -= p * p2.mass * nx; p1.vy -= p * p2.mass * ny;
        p2.vx += p * p1.mass * nx; p2.vy += p * p1.mass * ny;
    }
}

function gameLoop() {
    if (!gameRunning) return;

    p1.update(p2);
    p2.update(p1);
    checkCollision();

    // 渲染
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    p1.draw();
    p2.draw();

    // 輸贏判定
    const statusText = document.getElementById('status');
    if (p1.hp <= 0 && p2.hp <= 0) { statusText.innerText = "平手！"; gameRunning = false; }
    else if (p1.hp <= 0) { statusText.innerText = "藍方獲勝！"; gameRunning = false; }
    else if (p2.hp <= 0) { statusText.innerText = "紅方獲勝！"; gameRunning = false; }

    if (gameRunning) requestAnimationFrame(gameLoop);
}

document.getElementById('startBtn').addEventListener('click', () => {
    p1 = new Ball(150, 200, '#ff1744', 'p1', document.getElementById('p1Select').value);
    p2 = new Ball(450, 200, '#2979ff', 'p2', document.getElementById('p2Select').value);
    document.getElementById('status').innerText = "戰鬥中...";
    gameRunning = true;
    gameLoop();
});
</script>
</body>
</html>
